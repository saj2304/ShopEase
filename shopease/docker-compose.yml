version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: shopease_postgres
    environment:
      POSTGRES_DB: shopease_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: shopease_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: shopease_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/shopease_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    container_name: shopease_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
