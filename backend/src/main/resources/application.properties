# Application
spring.application.name=shopease-backend
server.port=${PORT:8085}

# PostgreSQL — uses environment variable on Render, fallback to local
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/shopease_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis — uses environment variable on Render, fallback to local
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# JWT
app.jwt.secret=${JWT_SECRET:ShopEase2024SecretKeyForJWTTokenGenerationMustBe256BitsLongAtLeast}
app.jwt.expiration=86400000

# Razorpay
app.razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_dummy}
app.razorpay.key.secret=${RAZORPAY_KEY_SECRET:dummy_secret}

# CORS — allow both local and production frontend
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method